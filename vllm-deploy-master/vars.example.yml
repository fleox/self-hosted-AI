# =============================================================================
#  Example variables — Qwen3.6 35B A3B FP8 (vLLM)
#  Copy to vars.yml, fill in secrets, then run:
#    ansible-playbook -i inventory.ini deploy-gemma-vllm.yml -e @vars.yml --ask-become-pass
#
#  TARGET: 1× or N× NVIDIA GPU — Qwen3.6 35B A3B FP8 (MoE, pre-quantized)
# =============================================================================

# --- Secrets (REQUIRED) -------------------------------------------------------
hf_token: ""                                    # leave empty for public models; HF "read" token otherwise
vllm_api_key: "generate-a-long-random-key"      # e.g. openssl rand -hex 32

# --- Model --------------------------------------------------------------------
model_repo: "Qwen/Qwen3.6-35B-A3B-FP8"         # HF repo (A3B active params, already FP8)
served_model_name: "qwen3.6-35b-a3b"            # name served through the OpenAI-compat API
vllm_image: "vllm/vllm-openai:latest"

# --- Sizing -------------------------------------------------------------------
max_model_len: 131072                           # native 128K context window
gpu_memory_utilization: 0.90
kv_cache_dtype: "fp8"
max_num_seqs: 32                                # max concurrency; tune down if OOM
vllm_quantization: ""                           # model already FP8 — no --quantization flag

# --- Qwen3 — tool calling / reasoning -----------------------------------------
tool_call_parser: "qwen3_xml"                   # Qwen3 native XML tool format
reasoning_parser: "qwen3"
enable_thinking: true                           # enables <think> reasoning budget
thinking_budget: 1024                           # max tokens allocated for reasoning

# --- MTP speculative decoding -------------------------------------------------
speculative_num_tokens: 2                       # draft tokens per step (method "mtp")

# --- Mamba / SSM (hybrid SSM layers in Qwen3-MoE) ----------------------------
mamba_cache_dtype: "float16"
mamba_ssm_cache_dtype: "float16"
mamba_cache_mode: "align"
gdn_prefill_backend: "triton"                   # Triton backend for GDN prefill

# --- Network ------------------------------------------------------------------
vllm_bind_host: "0.0.0.0"
# api_allowed_cidrs:                            # restrict access when binding 0.0.0.0
#   - "10.0.0.0/8"
#   - "51.83.0.0/16"

# --- Storage ------------------------------------------------------------------
hf_cache_dir: "/data/hf-cache"
prefetch_model: true

# =============================================================================
#  ADDITIONAL FLAGS
# =============================================================================
# tensor_parallel_size: 2   # multi-GPU: adds --tensor-parallel-size 2
# extra_vllm_args: "--disable-log-requests"
